<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VÍNCULOS — Gestión Profesional</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
        const firebaseConfig = { databaseURL: "https://vinculos-app-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window._fb = { db, ref, push, onValue, set };
    </script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --navy: #1A3A5C; --gold: #C8A84B; --cream: #F7F4EE; --red: #B22222; --green: #2E7D32; --lawyer: #4A4A4A; }
        body { font-family: -apple-system, sans-serif; background: var(--cream); color: #1c1c1e; }
        #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0F2540; padding:20px; }
        .login-card { background: white; padding: 30px; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; }
        .btn-role { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1.5px solid #ddd; cursor: pointer; font-weight: bold; background: white; }
        #app { display: none; }
        .topbar { background: var(--navy); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav-tabs { background: white; display: flex; border-bottom: 1px solid #ddd; overflow-x: auto; position: sticky; top: 0; z-index: 100; }
        .nav-tab { flex: 1; padding: 15px 10px; border: none; background: none; cursor: pointer; font-weight: 600; color: #666; font-size: 9px; text-transform: uppercase; min-width: 80px; }
        .nav-tab.active { color: var(--navy); border-bottom: 3px solid var(--gold); }
        .main { padding: 15px; max-width: 600px; margin: 0 auto; }
        .section { display: none; }
        .section.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 10px; }
        .btn-main { background: var(--navy); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; }
        .lawyer-banner { background: var(--lawyer); color: white; padding: 5px; font-size: 10px; text-align: center; text-transform: uppercase; }
        .modal-overlay { position: fixed; inset:0; background: rgba(0,0,0,0.7); display:none; align-items:center; justify-content:center; z-index:200; }
        .modal { background: white; padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2 style="color:var(--navy); font-family: Georgia;">⚖️ VÍNCULOS</h2>
        <br>
        <button class="btn-role" onclick="entrar('madre')">👩 Laura García (Madre)</button>
        <button class="btn-role" onclick="entrar('padre')">👨 Marcelo Ríos (Padre)</button>
        <hr style="margin: 15px 0">
        <button class="btn-role" onclick="abrirModal('m-lawyer')" style="border-color: var(--lawyer);">💼 Letrado Patrocinante</button>
        <button class="btn-role" onclick="entrar('juez')" style="background: var(--navy); color: white;">🏛️ Acceso Judicial</button>
    </div>
</div>

<div id="app">
    <div id="lawyer-header" class="lawyer-banner" style="display:none">Modo Letrado: Vista de Cliente Activa</div>
    <div class="topbar"><span>VÍNCULOS</span><small id="user-display"></small></div>
    <div class="nav-tabs">
        <button class="nav-tab active" onclick="irA('chat', this)">💬 Chat</button>
        <button class="nav-tab" onclick="irA('gastos', this)">💸 Gastos</button>
        <button class="nav-tab" onclick="irA('educa', this)">🏫 Escuela</button>
        <button class="nav-tab" onclick="irA('salud', this)">🏥 Salud</button>
    </div>

    <div class="main">
        <div id="sec-chat" class="section active">
            <div id="chat-box" style="height:350px; overflow-y:auto; border:1px solid #ddd; background:white; padding:10px; border-radius:8px; display:flex; flex-direction:column; gap:8px"></div>
            <div id="ctrl-padres" style="margin-top:10px">
                <textarea id="msg-in" style="width:100%; padding:8px; border-radius:6px; border:1px solid #ddd;" placeholder="Escribir..."></textarea>
                <button onclick="enviar()" class="btn-main" style="margin-top:5px">Enviar</button>
            </div>
            <div id="ctrl-profesional" style="display:none; margin-top:10px">
                <button class="btn-main" style="background:#555" onclick="alert('Descargando reporte certificado...')">📄 Descargar Prueba Certificada</button>
            </div>
        </div>

        <div id="sec-gastos" class="section">
            <div id="btn-gasto-ctrl"></div>
            <div id="lista-gastos" style="margin-top:15px"></div>
        </div>

        <div id="sec-educa" class="section"><div id="lista-educa"></div></div>
        <div id="sec-salud" class="section"><div id="lista-salud"></div></div>
    </div>
</div>

<div class="modal-overlay" id="m-lawyer"><div class="modal">
    <h3>Acceso Profesional</h3><br>
    <p style="font-size:12px">Seleccione la parte a la que representa:</p><br>
    <button class="btn-role" onclick="entrar('abogado_madre')">Representante de Laura García</button>
    <button class="btn-role" onclick="entrar('abogado_padre')">Representante de Marcelo Ríos</button>
</div></div>

<script>
    let usuario = ""; let rolActual = ""; let clienteRef = "";
    const path = "expedientes/FAM-09-2024-1847";

    function entrar(rol) {
        rolActual = rol;
        cerrarModales();
        
        if(rol.includes('abogado')) {
            clienteRef = rol === 'abogado_madre' ? "Laura García" : "Marcelo Ríos";
            usuario = "Abog. de " + clienteRef;
            document.getElementById('lawyer-header').style.display = 'block';
            document.getElementById('ctrl-padres').style.display = 'none';
            document.getElementById('ctrl-profesional').style.display = 'block';
        } else if(rol === 'juez') {
            usuario = "Juzgado de Familia";
            document.getElementById('ctrl-padres').style.display = 'none';
            document.getElementById('ctrl-profesional').style.display = 'block';
        } else {
            usuario = rol === 'madre' ? "Laura García" : "Marcelo Ríos";
            document.getElementById('btn-gasto-ctrl').innerHTML = '<button class="btn-main" onclick="alert(\'Cargar Gasto...\')">+ Nuevo Gasto</button>';
        }

        document.getElementById('user-display').innerText = usuario;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        conectar();
    }

    function enviar() {
        const { db, ref, push } = window._fb;
        push(ref(db, `${path}/chat`), { autor: usuario, txt: document.getElementById('msg-in').value, fecha: new Date().toLocaleTimeString() });
        document.getElementById('msg-in').value = "";
    }

    function conectar() {
        const { db, ref, onValue } = window._fb;
        onValue(ref(db, `${path}/chat`), snap => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            snap.forEach(c => {
                const m = c.val();
                // Si soy abogado de Laura, los mensajes de Laura salen a la derecha (azul) y los del padre a la izquierda
                const esMio = (rolActual === 'madre' || rolActual === 'abogado_madre') ? m.autor.includes("Laura") : m.autor.includes("Marcelo");
                
                box.innerHTML += `<div style="padding:10px; border-radius:10px; margin-bottom:5px; align-self:${esMio?'flex-end':'flex-start'}; background:${esMio?'var(--navy)':'#eee'}; color:${esMio?'white':'black'}">
                    <b>${m.autor}</b><br>${m.txt}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        const monitor = (tipo, divId) => {
            onValue(ref(db, `${path}/${tipo}`), snap => {
                const l = document.getElementById(divId); l.innerHTML = "";
                snap.forEach(c => {
                    const d = c.val();
                    l.innerHTML += `<div class="card"><b>${d.con}</b><br><small>${d.autor} - ${d.fecha}</small></div>`;
                });
            });
        };
        monitor('gastos', 'lista-gastos'); monitor('educacion', 'lista-educa'); monitor('salud', 'lista-salud');
    }

    function irA(s, btn) {
        document.querySelectorAll('.section').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(x => x.classList.remove('active'));
        document.getElementById('sec-'+s).classList.add('active');
        btn.classList.add('active');
    }
    function abrirModal(id) { document.getElementById(id).style.display = 'flex'; }
    function cerrarModales() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }
</script>
</body>
</html>
