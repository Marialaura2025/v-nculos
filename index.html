<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>VÍNCULOS — Gestión Parental</title>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
        
        const firebaseConfig = { databaseURL: "https://vinculos-app-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window._fb = { db, ref, push, onValue };
    </script>

    <style>
        :root { --navy: #1A3A5C; --gold: #C8A84B; --red: #B22222; --cream: #F7F4EE; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--cream); }
        
        /* Pantalla de Login */
        #login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--navy); padding: 20px; box-sizing: border-box; }
        .login-card { background: white; padding: 30px; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; }
        .btn-role { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; cursor: pointer; font-weight: bold; font-size: 14px; background: white; }
        
        /* App Principal */
        #app { display: none; }
        .topbar { background: var(--navy); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .nav { display: flex; background: white; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 10; }
        .tab { flex: 1; padding: 15px 5px; border: none; background: none; font-size: 10px; font-weight: bold; color: #666; text-transform: uppercase; }
        .tab.active { color: var(--navy); border-bottom: 3px solid var(--gold); }
        
        .section { display: none; padding: 15px; }
        .section.active { display: block; }

        /* Chat y Auditoría */
        #chat-display { height: 350px; overflow-y: auto; background: white; border: 1px solid #ddd; border-radius: 12px; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px; border-radius: 12px; font-size: 14px; max-width: 85%; }
        .msg.yo { align-self: flex-end; background: var(--navy); color: white; }
        .msg.otro { align-self: flex-start; background: #eee; color: black; }
        .audit-info { font-size: 10px; color: var(--red); font-weight: bold; margin-top: 4px; border-top: 1px solid #ffcccc; padding-top: 4px; }
        
        .btn-main { background: var(--navy); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<!-- PANTALLA DE ACCESO POR ROLES -->
<div id="login-screen">
    <div class="login-card">
        <h2 style="color:var(--navy)">VÍNCULOS</h2>
        <p style="font-size:12px; color:#888; margin-bottom:20px;">Expediente FAM-1847</p>
        <button class="btn-role" onclick="entrar('madre', 'Laura G.')">👩 Laura García (Madre)</button>
        <button class="btn-role" onclick="entrar('padre', 'Marcelo R.')">👨 Marcelo Ríos (Padre)</button>
        <button class="btn-role" onclick="entrar('juez', 'Juzgado')">🏛️ Acceso Juzgado / Abogados</button>
    </div>
</div>

<!-- APLICACIÓN PRINCIPAL -->
<div id="app">
    <div class="topbar">
        <span>VÍNCULOS</span>
        <button onclick="location.reload()" style="background:none; border:1px solid white; color:white; font-size:10px; padding:5px; border-radius:4px;">CERRAR SESIÓN</button>
    </div>
    
    <div class="nav">
        <button class="tab active" onclick="ver('chat', this)">💬 Chat</button>
        <button class="tab" onclick="ver('age', this)">📅 Agenda</button>
        <button class="tab" onclick="ver('doc', this)">📁 Documentos</button>
    </div>

    <div class="main">
        <!-- SECCIÓN CHAT -->
        <div id="sec-chat" class="section active">
            <div id="juez-alert" style="display:none; background:#fff3f3; color:red; padding:10px; border-radius:8px; font-size:11px; margin-bottom:10px; border:1px solid red;">
                ⚖️ MODO AUDITORÍA: El juzgado ve los mensajes originales en rojo.
            </div>
            <div id="chat-display"></div>
            <div id="input-area" style="margin-top:10px;">
                <textarea id="chat-in" placeholder="Escribe un mensaje..." style="width:100%; height:60px; padding:10px; border-radius:8px; border:1px solid #ddd; box-sizing:border-box;"></textarea>
                <button class="btn-main" onclick="procesarEnvio()">Enviar Mensaje</button>
            </div>
        </div>

        <!-- SECCIÓN AGENDA -->
        <div id="sec-age" class="section">
            <div id="calendar" style="display:grid; grid-template-columns: repeat(7, 1fr); gap:2px; background:#ddd;"></div>
        </div>

        <!-- SECCIÓN DOCUMENTOS -->
        <div id="sec-doc" class="section">
            <div style="background:white; padding:15px; border-radius:12px; border:1px solid #ddd;">
                <h3>Cargar Documento</h3>
                <input type="text" id="doc-name" placeholder="Nombre (ej: Boletín)" style="width:100%; padding:10px; margin:10px 0; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;">
                <input type="file" id="doc-file" style="font-size:12px;">
                <button class="btn-main" onclick="alert('Documento vinculado al expediente')">Subir al Sistema</button>
            </div>
        </div>
    </div>
</div>

<script>
    let miRol = ""; let miNombre = "";
    const DB_PATH = "expedientes/FAM-1847";

    function entrar(rol, nombre) {
        miRol = rol; miNombre = nombre;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        
        if(rol === 'juez') {
            document.getElementById('input-area').style.display = 'none';
            document.getElementById('juez-alert').style.display = 'block';
        }
        
        generarCalendario();
        conectarFirebase();
    }

    function ver(sec, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('sec-' + sec).classList.add('active');
        btn.classList.add('active');
    }

    function procesarEnvio() {
        const input = document.getElementById('chat-in');
        let texto = input.value.trim();
        if(!texto) return;

        const insultos = ["odio", "culpa", "malo", "siempre", "nunca"];
        let violentado = insultos.some(p => texto.toLowerCase().includes(p));
        
        let textoFinal = violentado ? "Mensaje procesado: comunicación enfocada en los hijos." : texto;

        window._fb.push(window._fb.ref(window._fb.db, DB_PATH + "/chat"), {
            autor: miNombre,
            texto: textoFinal,
            original: violentado ? texto : "",
            esIA: violentado,
            time: Date.now()
        });
        input.value = "";
    }

    function conectarFirebase() {
        const { db, ref, onValue } = window._fb;
        onValue(ref(db, DB_PATH + "/chat"), snap => {
            const display = document.getElementById('chat-display');
            display.innerHTML = "";
            snap.forEach(child => {
                const m = child.val();
                const yo = m.autor === miNombre;
                let html = `<div class="msg ${yo?'yo':'otro'}"><b>${m.autor}</b><br>${m.texto}`;
                
                // Solo el Juez ve el texto original violento
                if(miRol === 'juez' && m.esIA) {
                    html += `<div class="audit-info">ORIGINAL: ${m.original}</div>`;
                }
                
                display.innerHTML += html + `</div>`;
            });
            display.scrollTop = display.scrollHeight;
        });
    }

    function generarCalendario() {
        const cal = document.getElementById('calendar');
        cal.innerHTML = "";
        for(let i=1; i<=31; i++) {
            cal.innerHTML += `<div style="background:white; min-height:50px; padding:5px; font-size:10px;"><b>${i}</b></div>`;
        }
    }
</script>
</body>
</html>
