<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>VÍNCULOS — Gestión Parental</title>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
        
        const firebaseConfig = { databaseURL: "https://vinculos-app-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window._fb = { db, ref, push, onValue, set };
    </script>

    <style>
        :root { --navy: #1A3A5C; --gold: #C8A84B; --red: #B22222; --green: #2E7D32; --cream: #F7F4EE; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--cream); color: #333; }
        
        /* Login y Roles */
        #login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--navy); padding: 20px; box-sizing: border-box; }
        .login-card { background: white; padding: 30px; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; }
        .btn-role { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; cursor: pointer; font-weight: bold; background: white; }
        
        /* Navegación */
        #app { display: none; height: 100vh; display: flex; flex-direction: column; }
        .topbar { background: var(--navy); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .nav-tabs { background: white; display: flex; border-bottom: 1px solid #ddd; overflow-x: auto; }
        .tab { flex: 1; padding: 15px 10px; border: none; background: none; font-size: 10px; font-weight: bold; color: #666; text-transform: uppercase; min-width: 80px; }
        .tab.active { color: var(--navy); border-bottom: 3px solid var(--gold); }
        .tab.notif::after { content: ' ●'; color: var(--red); } /* Globo de notificación */

        /* Secciones */
        .main-content { flex: 1; overflow-y: auto; padding: 15px; }
        .section { display: none; }
        .section.active { display: block; }

        /* Chat y Auditoría */
        #chat-box { height: 300px; overflow-y: auto; background: white; border: 1px solid #ddd; border-radius: 12px; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 12px; font-size: 14px; max-width: 85%; position: relative; }
        .msg.yo { align-self: flex-end; background: var(--navy); color: white; }
        .msg.otro { align-self: flex-start; background: #e9e9eb; color: black; }
        .audit { font-size: 10px; margin-top: 5px; padding-top: 5px; border-top: 1px solid rgba(0,0,0,0.1); }

        /* Cards y Forms */
        .card { background: white; padding: 15px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 15px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-main { background: var(--navy); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2 style="color:var(--navy)">VÍNCULOS</h2>
        <button class="btn-role" onclick="entrar('madre', 'Laura G.')">👩 Laura García</button>
        <button class="btn-role" onclick="entrar('padre', 'Marcelo R.')">👨 Marcelo Ríos</button>
        <button class="btn-role" onclick="entrar('abogado', 'Letrado')">💼 Letrados</button>
        <button class="btn-role" onclick="entrar('juez', 'Juzgado')" style="background:var(--navy); color:white">🏛️ Juzgado</button>
    </div>
</div>

<div id="app" style="display:none;">
    <div class="topbar"><span>VÍNCULOS</span><button onclick="location.reload()" style="background:none; border:1px solid white; color:white; font-size:10px; padding:5px; border-radius:4px;">SALIR</button></div>
    
    <div class="nav-tabs">
        <button class="tab active" id="tab-chat" onclick="irA('chat', this)">💬 Chat</button>
        <button class="tab" id="tab-age" onclick="irA('age', this)">📅 Agenda</button>
        <button class="tab" id="tab-gas" onclick="irA('gas', this)">💸 Gastos</button>
        <button class="tab" id="tab-edu" onclick="irA('edu', this)">🏫 Escuela</button>
        <button class="tab" id="tab-sal" onclick="irA('sal', this)">🏥 Salud</button>
    </div>

    <div class="main-content">
        <!-- CHAT -->
        <div id="sec-chat" class="section active">
            <div id="chat-box"></div>
            <div id="input-area" style="margin-top:10px;">
                <textarea id="msg-in" placeholder="Escribe un mensaje..."></textarea>
                <button class="btn-main" onclick="enviarMensajeIA()">Enviar Mensaje</button>
            </div>
        </div>

        <!-- AGENDA -->
        <div id="sec-age" class="section">
            <div id="calendar" style="display:grid; grid-template-columns: repeat(7, 1fr); gap:2px; background:#ddd;"></div>
        </div>

        <!-- GASTOS / ESCUELA / SALUD (Comparten estructura de carga) -->
        <div id="sec-gas" class="section"><h3>💸 Gastos</h3><div class="card"><input id="g-con" placeholder="Concepto"><input type="number" id="g-mon" placeholder="$ Monto"><input type="file" id="g-adj"><button class="btn-main" onclick="guardarDato('gastos')">Guardar</button></div><div id="l-gas"></div></div>
        <div id="sec-edu" class="section"><h3>🏫 Escuela</h3><div class="card"><input id="e-con" placeholder="Nota/Evento"><input type="date" id="e-fec"><input type="file" id="e-adj"><button class="btn-main" onclick="guardarDato('escuela')">Guardar</button></div><div id="l-edu"></div></div>
        <div id="sec-sal" class="section"><h3>🏥 Salud</h3><div class="card"><input id="s-con" placeholder="Turno/Médico"><input type="date" id="s-fec"><input type="file" id="s-adj"><button class="btn-main" onclick="guardarDato('salud')">Guardar</button></div><div id="l-sal"></div></div>
    </div>
</div>

<script>
    let miRol = ""; let miNombre = "";
    const DB_PATH = "expedientes/FAM-1847";

    function entrar(rol, nombre) {
        miRol = rol; miNombre = nombre;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        if(rol === 'juez' || rol === 'abogado') document.getElementById('input-area').style.display = 'none';
        generarCalendario();
        conectarFirebase();
    }

    function irA(sec, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('sec-' + sec).classList.add('active');
        btn.classList.add('active');
        btn.classList.remove('notif'); // Limpiar globo al entrar
    }

    // IA y Protocolo de Mensajes
    function enviarMensajeIA() {
        const input = document.getElementById('msg-in');
        let rawText = input.value.trim();
        if(!rawText) return;

        // Filtro de IA con perspectiva de género y mediación
        const agresivos = ["siempre", "nunca", "plata", "culpa", "malo", "odio"];
        let esAgresivo = agresivos.some(p => rawText.toLowerCase().includes(p));
        
        // El mensaje que verá el otro padre si hay agresión
        let safeText = esAgresivo ? "Protocolo Vínculos: Se solicita comunicación asertiva centrada en los hijos." : rawText;

        const { db, ref, push, set } = window._fb;
        push(ref(db, DB_PATH + "/chat"), {
            autor: miNombre,
            textoVisible: safeText,
            textoOriginal: rawText,
            esIA: esAgresivo,
            time: Date.now()
        });
        
        // Notificación al otro padre
        set(ref(db, DB_PATH + "/notif"), { nuevo: true, autor: miNombre, time: Date.now() });
        input.value = "";
    }

    function guardarDato(tipo) {
        const { db, ref, push } = window._fb;
        let d = { autor: miNombre, time: Date.now() };
        
        if(tipo==='gastos') { d.con = document.getElementById('g-con').value; d.mon = document.getElementById('g-mon').value; }
        else {
            const idC = tipo==='escuela'?'e-con':'s-con';
            const idF = tipo==='escuela'?'e-fec':'s-fec';
            d.con = document.getElementById(idC).value; d.fec = document.getElementById(idF).value;
            // Guardar en agenda con color automático
            if(d.fec) {
                const dia = parseInt(d.fec.split('-')[2]);
                push(ref(db, DB_PATH + "/agenda"), { dia, obs: d.con, col: tipo==='escuela'?'var(--blue)':'var(--purple)' });
            }
        }
        push(ref(db, DB_PATH + "/" + tipo), d);
        set(ref(db, DB_PATH + "/notif"), { nuevo: true, autor: miNombre, time: Date.now() });
        alert("Cargado correctamente");
    }

    function conectarFirebase() {
        const { db, ref, onValue } = window._fb;
        
        // Escuchar Chat
        onValue(ref(db, DB_PATH + "/chat"), snap => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            snap.forEach(child => {
                const m = child.val();
                const yo = m.autor === miNombre;
                let html = `<div class="msg ${yo?'yo':'otro'}"><b>${m.autor}</b><br>${m.textoVisible}`;
                
                // Lógica de auditoría
                if(miRol === 'juez' && m.esIA) {
                    html += `<div class="audit" style="color:var(--red)">ORIGINAL: ${m.textoOriginal}</div>`;
                } else if(miRol === 'abogado' && m.esIA) {
                    html += `<div class="audit"><i>[Modificado por IA según protocolo]</i></div>`;
                }
                box.innerHTML += html + "</div>";
            });
            box.scrollTop = box.scrollHeight;
        });

        // Escuchar Notificaciones (Globo Rojo)
        onValue(ref(db, DB_PATH + "/notif"), snap => {
            const n = snap.val();
            if(n && n.autor !== miNombre) {
                document.getElementById('tab-chat').classList.add('notif');
                // Aquí podrías añadir un sonido con new Audio('URL').play();
            }
        });

        // Escuchar Agenda
        onValue(ref(db, DB_PATH + "/agenda"), snap => {
            document.querySelectorAll('.ev-item').forEach(e => e.remove());
            snap.forEach(child => {
                const e = child.val();
                const celda = document.getElementById('day-' + e.dia);
                if(celda) celda.innerHTML += `<div class="ev-item" style="background:${e.col}; color:white; font-size:8px; padding:2px; margin-top:1px;">${e.obs}</div>`;
            });
        });
    }

    function generarCalendario() {
        const cal = document.getElementById('calendar'); cal.innerHTML = "";
        for(let i=1; i<=31; i++) cal.innerHTML += `<div id="day-${i}" style="background:white; min-height:50px; border:0.5px solid #eee; padding:2px; font-size:10px;">${i}</div>`;
    }
</script>
</body>
</html>
