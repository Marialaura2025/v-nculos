<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VÍNCULOS — Plataforma Judicial</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            databaseURL: "https://vinculos-app-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window._fb = { db, ref, push, onValue, set };
    </script>

    <style>
        /* Estilos simplificados para máxima compatibilidad */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --navy: #1A3A5C; --gold: #C8A84B; --cream: #F7F4EE; --paper: #FDFBF7; --red: #8B1A1A; --green: #1A6B3A; }
        body { font-family: -apple-system, sans-serif; background: var(--cream); color: #1c1c1e; }
        #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0F2540; }
        .login-card { background: white; padding: 40px; border-radius: 16px; width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        #app { display: none; }
        .topbar { background: var(--navy); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .nav-tabs { background: white; display: flex; border-bottom: 1px solid #ddd; }
        .nav-tab { flex: 1; padding: 15px; border: none; background: none; cursor: pointer; font-weight: 600; color: #666; }
        .nav-tab.active { color: var(--navy); border-bottom: 3px solid var(--gold); }
        .main { padding: 20px; max-width: 600px; margin: 0 auto; }
        .section { display: none; }
        .section.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 15px; }
        .chat-window { background: white; height: 400px; border-radius: 10px; border: 1px solid #ddd; display: flex; flex-direction: column; }
        .chat-msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 10px; font-size: 14px; max-width: 80%; }
        .msg.yo { align-self: flex-end; background: var(--navy); color: white; }
        .msg.otro { align-self: flex-start; background: #eee; }
        .chat-input-area { padding: 10px; border-top: 1px solid #ddd; display: flex; gap: 5px; }
        textarea { flex: 1; padding: 8px; border-radius: 5px; border: 1px solid #ddd; }
        .modal-overlay { position: fixed; inset:0; background: rgba(0,0,0,0.7); display:none; align-items:center; justify-content:center; z-index:100; }
        .modal { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2 style="color:var(--navy); font-family:Georgia;">⚖️ VÍNCULOS</h2><br>
        <button class="nav-tab active" style="width:100%; border:1px solid #ddd; margin-bottom:10px" onclick="entrar('madre')">👩 Laura García (Madre)</button>
        <button class="nav-tab active" style="width:100%; border:1px solid #ddd" onclick="entrar('padre')">👨 Marcelo Ríos (Padre)</button>
    </div>
</div>

<div id="app">
    <div class="topbar">
        <span>VÍNCULOS Judicial</span>
        <small id="user-display"></small>
    </div>
    <div class="nav-tabs">
        <button class="nav-tab active" id="tab-msg" onclick="irA('mensajes')">Chat</button>
        <button class="nav-tab" id="tab-gastos" onclick="irA('gastos')">Gastos</button>
    </div>
    <div class="main">
        <div id="sec-mensajes" class="section active">
            <div class="chat-window">
                <div class="chat-msgs" id="chat-box"></div>
                <div class="chat-input-area">
                    <textarea id="msg-in" placeholder="Escribir mensaje oficial..."></textarea>
                    <button onclick="procesarMensaje()" style="background:var(--navy); color:white; border:none; padding:10px; border-radius:5px;">Enviar</button>
                </div>
            </div>
        </div>
        <div id="sec-gastos" class="section">
            <button onclick="document.getElementById('m-gasto').style.display='flex'" style="width:100%; padding:10px; margin-bottom:10px; background:var(--navy); color:white; border-radius:5px; border:none;">+ Nuevo Gasto Extraordinario</button>
            <div id="lista-gastos"></div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="m-ia">
    <div class="modal">
        <h4 style="color:var(--red)">⚠️ Perspectiva de Género</h4><br>
        <p style="font-size:12px; color:#666">El sistema detectó que tu mensaje puede escalar el conflicto.</p><br>
        <div style="background:#f9f9f9; padding:10px; border-radius:5px; font-style:italic; font-size:13px" id="msg-orig"></div><br>
        <p style="font-weight:bold; font-size:13px; color:var(--green)">Sugerencia Neutral:</p>
        <div style="background:#e8f5ee; padding:10px; border-radius:5px; font-size:13px" id="msg-sug"></div><br>
        <button onclick="enviarFinal('sug')" style="width:100%; padding:10px; background:var(--green); color:white; border:none; border-radius:5px; margin-bottom:10px">Usar sugerencia neutral</button>
        <button onclick="document.getElementById('m-ia').style.display='none'" style="width:100%; background:none; border:none; color:#999; font-size:12px">Editar mi mensaje</button>
    </div>
</div>

<div class="modal-overlay" id="m-gasto">
    <div class="modal">
        <h3>Nuevo Gasto</h3><br>
        <input type="text" id="g-con" placeholder="Concepto">
        <input type="number" id="g-mon" placeholder="Monto $">
        <button onclick="guardarGasto()" style="width:100%; padding:10px; background:var(--navy); color:white; border:none; border-radius:5px;">Cargar en Expediente</button>
        <button onclick="document.getElementById('m-gasto').style.display='none'" style="width:100%; background:none; border:none; margin-top:10px">Cerrar</button>
    </div>
</div>

<script>
    let usuario = "";
    const path = "expedientes/FAM-09-2024-1847";

    function entrar(u) {
        usuario = u === 'madre' ? "Laura García" : "Marcelo Ríos";
        document.getElementById('user-display').innerText = usuario;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        conectarFirebase();
    }

    function irA(s) {
        document.querySelectorAll('.section').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(x => x.classList.remove('active'));
        document.getElementById('sec-'+s).classList.add('active');
        if(s === 'mensajes') document.getElementById('tab-msg').classList.add('active');
        if(s === 'gastos') document.getElementById('tab-gastos').classList.add('active');
    }

    // --- EL ASISTENTE DE TONO (IA LOCAL) ---
    function procesarMensaje() {
        const txt = document.getElementById('msg-in').value.trim();
        if(!txt) return;

        // Lógica de análisis de conflicto
        const disparadores = ["porque vos", "siempre haces", "estupido", "estupida", "loco", "loca", "plata", "pagame", "culpable", "olvidate"];
        const esConflictivo = disparadores.some(d => txt.toLowerCase().includes(d));

        if(esConflictivo) {
            document.getElementById('msg-orig').innerText = `"${txt}"`;
            // Simulación de reescritura neutral
            document.getElementById('msg-sug').innerText = "Necesito comunicarte un tema importante respecto al niño/a para coordinar de forma objetiva.";
            document.getElementById('m-ia').style.display = 'flex';
        } else {
            enviarFinal('orig');
        }
    }

    function enviarFinal(tipo) {
        const texto = tipo === 'sug' ? document.getElementById('msg-sug').innerText : document.getElementById('msg-in').value;
        const { db, ref, push } = window._fb;
        push(ref(db, `${path}/mensajes`), {
            user: usuario,
            texto: texto,
            timestamp: Date.now()
        });
        document.getElementById('msg-in').value = "";
        document.getElementById('m-ia').style.display = 'none';
    }

    function guardarGasto() {
        const con = document.getElementById('g-con').value;
        const mon = document.getElementById('g-mon').value;
        const { db, ref, push } = window._fb;
        push(ref(db, `${path}/gastos`), {
            concepto: con,
            monto: mon,
            autor: usuario
        });
        document.getElementById('m-gasto').style.display = 'none';
        alert("Gasto registrado con valor probatorio.");
    }

    function conectarFirebase() {
        const { db, ref, onValue } = window._fb;
        // Escuchar Chat
        onValue(ref(db, `${path}/mensajes`), (snap) => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            snap.forEach(c => {
                const m = c.val();
                const d = document.createElement('div');
                d.className = `msg ${m.user === usuario ? 'yo' : 'otro'}`;
                d.innerHTML = `<b>${m.user}</b><br>${m.texto}`;
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        });
        // Escuchar Gastos
        onValue(ref(db, `${path}/gastos`), (snap) => {
            const list = document.getElementById('lista-gastos');
            list.innerHTML = "";
            snap.forEach(c => {
                const g = c.val();
                list.innerHTML += `<div class="card"><b>${g.concepto}</b><br><span style="color:var(--navy); font-size:18px">$${g.monto}</span><br><small>Cargado por ${g.autor}</small></div>`;
            });
        });
    }
</script>
</body>
</html>
