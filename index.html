<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Configuración para que funcione como App en Android y iPhone -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1A3A5C">
    
    <title>VÍNCULOS — Gestión Parental</title>

    <!-- Conexión con el motor de base de datos Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
        
        const firebaseConfig = { databaseURL: "https://vinculos-app-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window._fb = { db, ref, push, onValue };
    </script>

    <style>
        :root { --navy: #1A3A5C; --gold: #C8A84B; --blue: #1976D2; --purple: #9c27b0; --cream: #F7F4EE; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--cream); color: #333; -webkit-tap-highlight-color: transparent; }
        
        /* Interfaz de Navegación */
        .header { background: var(--navy); color: white; padding: 20px; text-align: center; font-weight: bold; border-bottom: 3px solid var(--gold); }
        .nav { display: flex; background: white; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .nav-btn { flex: 1; padding: 15px 5px; border: none; background: none; font-weight: bold; color: #666; font-size: 10px; text-transform: uppercase; cursor: pointer; }
        .nav-btn.active { color: var(--navy); border-bottom: 4px solid var(--gold); }
        
        .section { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Estilo del Chat */
        #chat-display { height: 350px; overflow-y: auto; background: white; border: 1px solid #ddd; border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; }
        .bubble { padding: 10px; border-radius: 12px; max-width: 80%; font-size: 14px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .bubble.yo { align-self: flex-end; background: var(--navy); color: white; border-bottom-right-radius: 2px; }
        .bubble.otro { align-self: flex-start; background: #e9e9eb; color: black; border-bottom-left-radius: 2px; }

        /* Estilo de la Agenda */
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: #ddd; border: 1px solid #ddd; }
        .day { background: white; min-height: 80px; padding: 5px; font-size: 10px; }
        .ev { font-size: 8px; padding: 2px; border-radius: 2px; color: white; margin-top: 2px; line-height: 1.1; }

        /* Formularios */
        .card { background: white; padding: 15px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 10px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn-main { background: var(--navy); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">⚖️ VÍNCULOS</div>

<nav class="nav">
    <button class="nav-btn active" onclick="tab('chat', this)">💬 Chat</button>
    <button class="nav-tab nav-btn" onclick="tab('age', this)">📅 Agenda</button>
    <button class="nav-tab nav-btn" onclick="tab('edu', this)">🏫 Escuela</button>
    <button class="nav-tab nav-btn" onclick="tab('sal', this)">🏥 Salud</button>
</nav>

<main>
    <!-- SECCIÓN CHAT -->
    <div id="sec-chat" class="section active">
        <div id="chat-display"></div>
        <textarea id="chat-input" placeholder="Escribe un mensaje constructivo..."></textarea>
        <button class="btn-main" onclick="enviarMensaje()">Enviar Mensaje</button>
    </div>

    <!-- SECCIÓN AGENDA -->
    <div id="sec-age" class="section">
        <h3 style="text-align: center;">Mayo 2026</h3>
        <div class="grid" id="calendar-grid"></div>
        <div style="margin-top:10px; font-size:10px;">🔵 Escuela | 🟣 Salud</div>
    </div>

    <!-- SECCIÓN ESCUELA -->
    <div id="sec-edu" class="section">
        <div class="card">
            <h3>🏫 Registro Escolar</h3>
            <input type="text" id="edu-titulo" placeholder="Ej: Reunión de padres">
            <input type="date" id="edu-fecha">
            <button class="btn-main" onclick="guardarEvento('educacion')">Cargar a Escuela</button>
        </div>
    </div>

    <!-- SECCIÓN SALUD -->
    <div id="sec-sal" class="section">
        <div class="card">
            <h3>🏥 Registro Médico</h3>
            <input type="text" id="sal-titulo" placeholder="Ej: Turno Pediatra">
            <input type="date" id="sal-fecha">
            <button class="btn-main" onclick="guardarEvento('salud')">Cargar a Salud</button>
        </div>
    </div>
</main>

<script>
    let usuarioActivo = "Laura G."; // Simulación de usuario
    const DB_PATH = "expedientes/FAM-1847";

    // Navegación entre pestañas (Lógica de interfaz)
    function tab(nombre, boton) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('sec-' + nombre).classList.add('active');
        boton.classList.add('active');
    }

    // Lógica de Inteligencia Artificial y Envío de Chat
    function enviarMensaje() {
        const input = document.getElementById('chat-input');
        const textoOriginal = input.value.trim();
        if(!textoOriginal) return;

        // Diccionario de términos conflictivos (Filtro de IA)
        const palabrasBloqueadas = ["odio", "culpa", "siempre", "nunca", "malo", "plata"];
        const esConflictivo = palabrasBloqueadas.some(p => textoOriginal.toLowerCase().includes(p));
        
        // Si hay conflicto, la IA genera un mensaje neutro
        const textoParaMostrar = esConflictivo 
            ? "Mensaje procesado: Se solicita mantener la comunicación enfocada en el bienestar de los hijos." 
            : textoOriginal;

        const { db, ref, push } = window._fb;
        push(ref(db, DB_PATH + "/chat"), {
            autor: usuarioActivo,
            texto: textoParaMostrar,
            originalParaJuez: esConflictivo ? textoOriginal : "",
            esAuditado: esConflictivo,
            fecha: Date.now()
        });
        input.value = "";
    }

    // Lógica de Agenda: Guarda y asigna colores automáticamente
    function guardarEvento(categoria) {
        const titulo = document.getElementById(categoria === 'educacion' ? 'edu-titulo' : 'sal-titulo').value;
        const fechaRaw = document.getElementById(categoria === 'educacion' ? 'edu-fecha' : 'sal-fecha').value;
        
        if(!titulo || !fechaRaw) return alert("Por favor, completa todos los campos.");

        const diaDelMes = parseInt(fechaRaw.split('-')[2]);
        const colorAsignado = categoria === 'educacion' ? 'var(--blue)' : 'var(--purple)';

        const { db, ref, push } = window._fb;
        push(ref(db, DB_PATH + "/agenda"), {
            dia: diaDelMes,
            titulo: titulo,
            color: colorAsignado,
            tipo: categoria
        });

        alert("Evento registrado y marcado en la agenda.");
        tab('age', document.querySelectorAll('.nav-btn')[1]);
    }

    // Conexión en tiempo real con Firebase (Sincronización)
    function iniciarSincronizacion() {
        const { db, ref, onValue } = window._fb;

        // Escuchar el Chat
        onValue(ref(db, DB_PATH + "/chat"), snap => {
            const display = document.getElementById('chat-display');
            display.innerHTML = "";
            snap.forEach(child => {
                const m = child.val();
                const clase = m.autor === usuarioActivo ? 'yo' : 'otro';
                display.innerHTML += `<div class="bubble ${clase}"><b>${m.autor}</b><br>${m.texto}</div>`;
            });
            display.scrollTop = display.scrollHeight;
        });

        // Escuchar la Agenda
        onValue(ref(db, DB_PATH + "/agenda"), snap => {
            // Limpiar eventos previos antes de re-dibujar
            document.querySelectorAll('.ev').forEach(e => e.remove());
            snap.forEach(child => {
                const ev = child.val();
                const celda = document.getElementById('dia-' + ev.dia);
                if(celda) {
                    celda.innerHTML += `<div class="ev" style="background:${ev.color}">${ev.titulo}</div>`;
                }
            });
        });
    }

    // Generar el calendario visual inicial
    const calendarioGrid = document.getElementById('calendar-grid');
    for(let i=1; i<=31; i++) {
        calendarioGrid.innerHTML += `<div class="day" id="dia-${i}"><b>${i}</b></div>`;
    }

    iniciarSincronizacion();
</script>
</body>
</html>
