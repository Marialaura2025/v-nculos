<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VÍNCULOS — Gestión Parental</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
        const firebaseConfig = { databaseURL: "https://vinculos-app-default-rtdb.firebaseio.com/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window._fb = { db, ref, push, onValue, set, remove };
    </script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --navy: #1A3A5C; --gold: #C8A84B; --cream: #F7F4EE; --red: #B22222; --green: #2E7D32; --blue: #1976D2; }
        body { font-family: -apple-system, sans-serif; background: var(--cream); color: #1c1c1e; }
        #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0F2540; padding: 20px; }
        .login-card { background: white; padding: 30px; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; }
        .btn-role { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 8px; border: 1.5px solid #ddd; cursor: pointer; font-weight: bold; background: white; }
        #app { display: none; }
        .topbar { background: var(--navy); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .nav-tabs { background: white; display: flex; border-bottom: 1px solid #ddd; position: sticky; top: 44px; z-index: 900; }
        .nav-tab { flex: 1; padding: 15px 5px; border: none; background: none; cursor: pointer; font-weight: 600; color: #666; font-size: 9px; text-transform: uppercase; }
        .nav-tab.active { color: var(--navy); border-bottom: 3px solid var(--gold); }
        .main { padding: 15px; max-width: 600px; margin: 0 auto; }
        .section { display: none; }
        .section.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 12px; position: relative; }
        .btn-main { background: var(--navy); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
        #chat-box { height: 350px; overflow-y: auto; border: 1px solid #ddd; background: white; padding: 15px; border-radius: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 12px; font-size: 13px; max-width: 85%; }
        .msg.yo { align-self: flex-end; background: var(--navy); color: white; }
        .msg.otro { align-self: flex-start; background: #eee; color: black; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #ddd; border: 1px solid #ddd; margin-top: 10px; }
        .cal-day { background: white; min-height: 65px; padding: 5px; font-size: 10px; position: relative; }
        .cal-event { font-size: 7px; padding: 2px; border-radius: 2px; color: white; margin-top: 2px; line-height: 1; }
        .modal-overlay { position: fixed; inset:0; background: rgba(0,0,0,0.8); display:none; align-items:center; justify-content:center; z-index:2000; }
        .modal { background: white; padding: 25px; border-radius: 16px; width: 90%; max-width: 400px; }
        input, textarea, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; margin-top: 10px; }
        .btn-del { font-size: 10px; color: var(--red); background: none; border: none; cursor: pointer; float: right; }
    </style>
</head>
<body>

<audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

<div id="login-screen">
    <div class="login-card">
        <h2 style="color:var(--navy)">⚖️ VÍNCULOS</h2>
        <p style="font-size:11px; color:#888; margin-bottom:20px">Plataforma Judicial - Exp. 1847</p>
        <button class="btn-role" onclick="entrar('madre')">👩 Laura García</button>
        <button class="btn-role" onclick="entrar('padre')">👨 Marcelo Ríos</button>
        <button class="btn-role" onclick="abrirModal('m-lawyer')" style="border-color:#aaa">💼 Letrados</button>
        <button class="btn-role" onclick="entrar('juez')" style="background:var(--navy); color:white">🏛️ Juzgado</button>
    </div>
</div>

<div id="app">
    <div class="topbar"><span>VÍNCULOS</span><small id="user-display"></small></div>
    <div class="nav-tabs">
        <button class="nav-tab active" onclick="irA('chat', this)">💬 Chat</button>
        <button class="nav-tab" onclick="irA('age', this)">📅 Agenda</button>
        <button class="nav-tab" onclick="irA('gas', this)">💸 Gastos</button>
        <button class="nav-tab" onclick="irA('edu', this)">🏫 Escuela</button>
        <button class="nav-tab" onclick="irA('sal', this)">🏥 Salud</button>
    </div>

    <div class="main">
        <div id="sec-chat" class="section active">
            <div id="audit-ui" style="display:none; font-size:11px; color:var(--red); margin-bottom:10px">🛡️ Incidentes Detectados: <span id="incident-val">0</span></div>
            <div id="chat-box"></div>
            <div id="input-area" style="margin-top:10px">
                <textarea id="msg-in" placeholder="Mensaje..."></textarea>
                <button onclick="procesarIA()" class="btn-main">Enviar</button>
            </div>
        </div>

        <div id="sec-age" class="section">
            <h4 id="mes-titulo">Mayo 2026</h4>
            <div class="cal-grid" id="cal-grid"></div>
            <button class="btn-main" onclick="abrirModal('m-incidencia')">Registrar Incidencia Régimen</button>
        </div>

        <div id="sec-gas" class="section"><button class="btn-main" onclick="abrirModal('m-gasto')">+ Cargar Gasto</button><div id="lista-gas" style="margin-top:15px"></div></div>
        <div id="sec-edu" class="section"><button class="btn-main" onclick="abrirModal('m-edu')">+ Cargar Escuela</button><div id="lista-edu" style="margin-top:15px"></div></div>
        <div id="sec-sal" class="section"><button class="btn-main" onclick="abrirModal('m-sal')">+ Cargar Salud</button><div id="lista-sal" style="margin-top:15px"></div></div>
    </div>
</div>

<div class="modal-overlay" id="m-ia"><div class="modal"><h4 style="color:var(--red)">Tono Detectado</h4><div id="ia-sug" style="margin:15px 0; font-style:italic"></div><button class="btn-main" onclick="enviarFinal(true)">Enviar Sugerencia</button><button class="btn-main" style="background:#888" onclick="cerrarModales()">Corregir</button></div></div>
<div class="modal-overlay" id="m-lawyer"><div class="modal"><h3>Letrados</h3><button class="btn-role" onclick="entrar('abogado_madre')">Laura G.</button><button class="btn-role" onclick="entrar('abogado_padre')">Marcelo R.</button></div></div>
<div class="modal-overlay" id="m-gasto"><div class="modal"><h3>Gasto</h3><input id="g-con" placeholder="Concepto"><input type="number" id="g-mon" placeholder="$ Monto"><button class="btn-main" onclick="guardar('gastos')">Guardar</button></div></div>
<div class="modal-overlay" id="m-edu"><div class="modal"><h3>Escuela</h3><input id="e-con" placeholder="Reunión/Nota"><input type="date" id="e-fec"><button class="btn-main" onclick="guardar('educacion')">Guardar</button></div></div>
<div class="modal-overlay" id="m-sal"><div class="modal"><h3>Salud</h3><input id="s-con" placeholder="Turno/Certificado"><input type="date" id="s-fec"><button class="btn-main" onclick="guardar('salud')">Guardar</button></div></div>
<div class="modal-overlay" id="m-incidencia"><div class="modal"><h3>Incidencia</h3><input type="date" id="i-fec"><select id="i-tipo"><option value="acuerdo">Acuerdo</option><option value="incumplimiento">Incumplimiento</option></select><button class="btn-main" onclick="guardarIncidencia()">Guardar</button></div></div>

<script>
    let usuario = ""; let rolActual = ""; let lastMsgCount = 0;
    const path = "expedientes/FAM-1847";

    function entrar(rol) {
        rolActual = rol; cerrarModales();
        usuario = rol.includes('madre') ? "Laura G." : (rol.includes('padre') ? "Marcelo R." : "Juzgado");
        document.getElementById('user-display').innerText = usuario;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        if(rol==='juez'||rol.includes('abogado')) {
            document.getElementById('input-area').style.display = 'none';
            document.getElementById('audit-ui').style.display = 'block';
        }
        generarCal(); conectar();
    }

    function irA(sec, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.getElementById('sec-' + sec).classList.add('active');
        btn.classList.add('active');
    }

    function procesarIA() {
        const t = document.getElementById('msg-in').value;
        if(["culpa","odio","siempre","nunca","plata"].some(w => t.toLowerCase().includes(w))) {
            document.getElementById('ia-sug').innerText = "Mantengamos el foco en la organización de los chicos.";
            document.getElementById('m-ia').style.display = 'flex';
        } else { enviarFinal(false); }
    }

    function enviarFinal(ia) {
        const { db, ref, push } = window._fb;
        push(ref(db, `${path}/chat`), { autor: usuario, txt: ia ? document.getElementById('ia-sug').innerText : document.getElementById('msg-in').value, esIA: ia, original: ia ? document.getElementById('msg-in').value : "", time: Date.now() });
        document.getElementById('msg-in').value = ""; cerrarModales();
    }

    function guardar(tipo) {
        const { db, ref, push } = window._fb;
        let d = { autor: usuario, time: Date.now(), fecha: new Date().toLocaleDateString() };
        if(tipo==='gastos') { d.con = document.getElementById('g-con').value; d.mon = document.getElementById('g-mon').value; }
        else {
            const idF = tipo==='educacion'?'e-fec':'s-fec';
            const idC = tipo==='educacion'?'e-con':'s-con';
            d.con = document.getElementById(idC).value; d.fec = document.getElementById(idF).value;
            if(d.fec) {
                const dia = parseInt(d.fec.split('-')[2]);
                push(ref(db, `${path}/agenda`), { dia, obs: d.con, tipo: tipo==='educacion'?'escuela':'salud' });
            }
        }
        push(ref(db, `${path}/${tipo}`), d); cerrarModales();
    }

    function borrarDato(tipo, id) {
        if(confirm("¿Borrar este registro?")) { window._fb.remove(window._fb.ref(window._fb.db, `${path}/${tipo}/${id}`)); }
    }

    function guardarIncidencia() {
        const dia = parseInt(document.getElementById('i-fec').value.split('-')[2]);
        window._fb.push(window._fb.ref(window._fb.db, `${path}/agenda`), { dia, tipo: document.getElementById('i-tipo').value, obs: "Incidencia Régimen", autor: usuario });
        cerrarModales();
    }

    function conectar() {
        const { db, ref, onValue } = window._fb;
        
        onValue(ref(db, `${path}/chat`), snap => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            let c = 0; let total = 0;
            snap.forEach(mSnap => {
                const m = mSnap.val(); total++;
                if(m.esIA) c++;
                const yo = m.autor === usuario;
                let html = `<div class="msg ${yo?'yo':'otro'}"><b>${m.autor}</b><br>${m.txt}`;
                if(m.esIA && rolActual==='juez') html += `<br><small style="color:red">ORIGINAL: ${m.original}</small>`;
                box.innerHTML += html + `</div>`;
            });
            if(total > lastMsgCount && lastMsgCount !== 0) { document.getElementById('notif-sound').play(); }
            lastMsgCount = total;
            document.getElementById('incident-val').innerText = c;
            box.scrollTop = box.scrollHeight;
        });

        onValue(ref(db, `${path}/agenda`), snap => {
            document.querySelectorAll('.cal-event').forEach(e => e.remove());
            snap.forEach(eSnap => {
                const e = eSnap.val(); const d = document.getElementById('day-'+e.dia);
                if(d) {
                    const col = e.tipo==='escuela'?'var(--blue)':(e.tipo==='salud'?'#9c27b0':(e.tipo==='acuerdo'?'var(--green)':'var(--red)'));
                    d.innerHTML += `<div class="cal-event" style="background:${col}">${e.obs}</div>`;
                }
            });
        });

        const monitorear = (t, listId) => {
            onValue(ref(db, `${path}/${t}`), snap => {
                const l = document.getElementById(listId); l.innerHTML = "";
                snap.forEach(dSnap => {
                    const d = dSnap.val();
                    l.innerHTML += `<div class="card">
                        ${d.autor === usuario ? `<button class="btn-del" onclick="borrarDato('${t}','${dSnap.key}')">🗑️</button>` : ''}
                        <b>${d.con}</b> ${d.mon?'($'+d.mon+')':''}<br><small>${d.autor} - ${d.fecha || d.fec}</small>
                    </div>`;
                });
            });
        };
        monitorear('gastos','lista-gas'); monitorear('educacion','lista-edu'); monitorear('salud','lista-sal');
    }

    function generarCal() {
        const g = document.getElementById('cal-grid'); g.innerHTML = "";
        for(let i=1; i<=31; i++) g.innerHTML += `<div class="cal-day" id="day-${i}"><b>${i}</b></div>`;
    }
    function abrirModal(id) { document.getElementById(id).style.display = 'flex'; }
    function cerrarModales() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }
</script>
</body>
</html>
